site_name: NLP-Training-2026
site_description: 딥러닝을 이용한 자연어처리 실무 교육과정
site_author: NLP-Training-2026 Authors

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.select

nav:
  - Home: index.md
  - Part 1. 자연어처리 기초와 Python:
      - Chapter 1. 인공지능과 자연어처리의 이해:
          - Overview: part01/chapter01/README.md
          - 01. Opening: part01/chapter01/01_Opening.md
          - 02. 인공지능의 발전: part01/chapter01/02_AI_History.md
          - 03. 머신러닝과 딥러닝: part01/chapter01/03_Machine_Learning.md
          - 04. 자연어처리란 무엇인가: part01/chapter01/04_NLP.md
          - 05. 생성형 AI와 LLM: part01/chapter01/05_Generative_AI_and_LLM.md
          - 06. NLP 활용 사례: part01/chapter01/06_NLP_Cases.md
          - 07. 실습 환경 구축: part01/chapter01/07_Lab_Setup.md
          - Windows 환경 확인: part01/chapter01/WINDOWS_SETUP.md
          - Troubleshooting: part01/chapter01/TROUBLESHOOTING.md
          - 08. Chapter 요약: part01/chapter01/08_Summary.md
          - 09. Quiz: part01/chapter01/09_Quiz.md
          - 10. Assignment: part01/chapter01/10_Assignment.md
          - 11. Mini Project: part01/chapter01/11_Mini_Project.md
          - 실습 자료:
              - Examples Overview: examples/chapter01/README.md
              - Notebooks Overview: notebooks/chapter01/README.md
              - Mini Project 완성 예제: projects/chapter01_mini_project/README.md
              - Mini Project 테스트 결과: projects/chapter01_mini_project/test_cases.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
