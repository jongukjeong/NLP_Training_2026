<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 16px; fill: #4b5563; }
  .label { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
  .small { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 14px; fill: #374151; }
  .tiny { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 12px; fill: #4b5563; }
  .box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 18; }
  .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
  .box-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 18; }
  .box-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
  .box-purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; rx: 18; }
  .box-red { fill: #fef2f2; stroke: #fca5a5; stroke-width: 2; rx: 18; }
  .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  .line { stroke: #9ca3af; stroke-width: 2; fill: none; }
</style>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
  </marker>
</defs>

<rect class="bg" width="1400" height="720"/>
<text x="60" y="70" class="title">NLP 처리 흐름</text>
<text x="60" y="105" class="subtitle">사람의 문장을 컴퓨터가 처리할 수 있는 형태로 바꾸고, 모델 결과를 사람이 이해할 수 있게 해석합니다.</text>

<rect x="60" y="250" width="170" height="120" class="box-blue"/>
<text x="100" y="295" class="label">텍스트 입력</text>
<text x="85" y="330" class="small">사용자 질문</text>

<path d="M235 310 H310" class="arrow"/>

<rect x="320" y="250" width="170" height="120" class="box-green"/>
<text x="373" y="295" class="label">전처리</text>
<text x="345" y="330" class="small">정리 / 정규화</text>

<path d="M495 310 H570" class="arrow"/>

<rect x="580" y="250" width="170" height="120" class="box-orange"/>
<text x="625" y="295" class="label">토큰화</text>
<text x="610" y="330" class="small">문장을 작은 단위로</text>

<path d="M755 310 H830" class="arrow"/>

<rect x="840" y="250" width="170" height="120" class="box-purple"/>
<text x="885" y="295" class="label">수치화</text>
<text x="865" y="330" class="small">벡터 / 임베딩</text>

<path d="M1015 310 H1090" class="arrow"/>

<rect x="1100" y="250" width="220" height="120" class="box-red"/>
<text x="1165" y="295" class="label">모델 처리</text>
<text x="1140" y="330" class="small">분류 / 생성 / 검색</text>

<path d="M1210 375 V465" class="arrow"/>

<rect x="1040" y="475" width="280" height="120" class="box"/>
<text x="1125" y="520" class="label">결과 해석</text>
<text x="1085" y="555" class="small">답변, 분류 결과, 요약문</text>

<rect x="60" y="475" width="810" height="120" class="box"/>
<text x="95" y="520" class="label">핵심 관점</text>
<text x="95" y="555" class="small">컴퓨터는 문장을 바로 의미로 이해하지 않기 때문에, 토큰화와 수치화 과정이 필요합니다.</text>
</svg>
