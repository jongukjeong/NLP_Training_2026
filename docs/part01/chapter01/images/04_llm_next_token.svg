<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 16px; fill: #4b5563; }
  .label { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
  .small { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 14px; fill: #374151; }
  .tiny { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 12px; fill: #4b5563; }
  .box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 18; }
  .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
  .box-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 18; }
  .box-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
  .box-purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; rx: 18; }
  .box-red { fill: #fef2f2; stroke: #fca5a5; stroke-width: 2; rx: 18; }
  .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  .line { stroke: #9ca3af; stroke-width: 2; fill: none; }
</style>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
  </marker>
</defs>

<rect class="bg" width="1400" height="720"/>
<text x="60" y="70" class="title">LLM의 다음 토큰 예측</text>
<text x="60" y="105" class="subtitle">LLM은 지금까지의 문맥을 보고 다음에 올 가능성이 높은 토큰을 예측하는 과정을 반복합니다.</text>

<rect x="100" y="210" width="330" height="110" class="box-blue"/>
<text x="140" y="255" class="label">입력 문맥</text>
<text x="140" y="290" class="small">오늘 날씨가 정말</text>

<path d="M435 265 H530" class="arrow"/>

<rect x="540" y="210" width="280" height="110" class="box-purple"/>
<text x="640" y="255" class="label">LLM</text>
<text x="585" y="290" class="small">다음 토큰 확률 계산</text>

<path d="M825 265 H920" class="arrow"/>

<rect x="930" y="160" width="350" height="210" class="box-green"/>
<text x="970" y="205" class="label">후보 토큰</text>
<text x="980" y="250" class="small">좋다  0.42</text>
<text x="980" y="285" class="small">춥다  0.21</text>
<text x="980" y="320" class="small">맑다  0.16</text>
<text x="980" y="355" class="small">...</text>

<path d="M1105 375 V455" class="arrow"/>

<rect x="920" y="465" width="360" height="110" class="box-orange"/>
<text x="960" y="510" class="label">선택된 토큰 추가</text>
<text x="960" y="545" class="small">오늘 날씨가 정말 좋다</text>

<path d="M920 520 C760 630, 430 610, 275 330" class="arrow"/>

<rect x="100" y="465" width="620" height="110" class="box"/>
<text x="140" y="510" class="label">핵심</text>
<text x="140" y="545" class="small">한 번에 전체 답을 만드는 것이 아니라, 토큰을 하나씩 이어가며 문장을 생성합니다.</text>
</svg>
