<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">

<style>
  .bg { fill: #ffffff; }
  .title { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
  .subtitle { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 16px; fill: #4b5563; }
  .label { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
  .small { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 14px; fill: #374151; }
  .tiny { font-family: Arial, 'Noto Sans KR', sans-serif; font-size: 12px; fill: #4b5563; }
  .box { fill: #f9fafb; stroke: #d1d5db; stroke-width: 2; rx: 18; }
  .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 18; }
  .box-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 18; }
  .box-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 18; }
  .box-purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; rx: 18; }
  .box-red { fill: #fef2f2; stroke: #fca5a5; stroke-width: 2; rx: 18; }
  .arrow { stroke: #6b7280; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
  .line { stroke: #9ca3af; stroke-width: 2; fill: none; }
</style>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
  </marker>
</defs>

<rect class="bg" width="1400" height="760"/>
<text x="60" y="70" class="title">규칙 기반 AI vs 머신러닝</text>
<text x="60" y="105" class="subtitle">규칙 기반은 사람이 규칙을 만들고, 머신러닝은 데이터에서 패턴을 학습합니다.</text>

<rect x="80" y="170" width="560" height="470" class="box-blue"/>
<text x="250" y="220" class="label">규칙 기반 AI</text>
<rect x="140" y="270" width="440" height="70" class="box"/>
<text x="180" y="315" class="small">사람이 규칙 작성: IF "배송" THEN 배송 문의</text>
<path d="M360 345 V395" class="arrow"/>
<rect x="140" y="405" width="440" height="70" class="box"/>
<text x="180" y="450" class="small">입력 문장을 규칙과 비교</text>
<path d="M360 480 V530" class="arrow"/>
<rect x="140" y="540" width="440" height="70" class="box-green"/>
<text x="215" y="585" class="small">규칙에 맞으면 결과 출력</text>

<rect x="760" y="170" width="560" height="470" class="box-green"/>
<text x="945" y="220" class="label">머신러닝</text>
<rect x="820" y="270" width="440" height="70" class="box"/>
<text x="875" y="315" class="small">예시 데이터와 정답을 준비</text>
<path d="M1040 345 V395" class="arrow"/>
<rect x="820" y="405" width="440" height="70" class="box"/>
<text x="875" y="450" class="small">모델이 데이터에서 패턴 학습</text>
<path d="M1040 480 V530" class="arrow"/>
<rect x="820" y="540" width="440" height="70" class="box-orange"/>
<text x="895" y="585" class="small">새 문장에 대해 결과 예측</text>

<line x1="700" y1="160" x2="700" y2="660" stroke="#d1d5db" stroke-width="3"/>

<text x="140" y="690" class="small">장점: 설명이 쉽고 제어 가능</text>
<text x="140" y="720" class="small">한계: 예외와 표현 변화가 많으면 관리 어려움</text>
<text x="820" y="690" class="small">장점: 복잡한 패턴을 데이터에서 학습 가능</text>
<text x="820" y="720" class="small">한계: 데이터 품질과 평가가 중요</text>
</svg>
